name: Build and Release

on:
  push:
    tags:
      - 'v*'

# gh でリリースを作るため書き込み権限を付与
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read version from pyproject.toml
        id: meta
        shell: pwsh
        run: |
          $data = Get-Content pyproject.toml -Raw
          if ($data -match 'version\s*=\s*"([^"]+)"') {
            "version=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            throw "version not found in pyproject.toml"
          }

      # ── onedir (-d) ビルド & ZIP ──
      - name: Build dir (-d)
        run: |
          pyinstaller water_info_acquirer_onedir.spec

      - name: Zip dir (-d)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-d\*" -DestinationPath "Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-d.zip"

      # ── onefile (-f) ビルド & ZIP ──
      - name: Build file (-f)
        run: |
          pyinstaller water_info_acquirer_onefile.spec

      - name: Zip file (-f)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-f.exe" -DestinationPath "Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-f.zip"

      # ── ドラフトリリース作成＋アセット添付（gh CLI） ──
      - name: Create draft release and upload assets (gh)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            "Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-d.zip" `
            "Water-Info-Acquirer-v${{ steps.meta.outputs.version }}-win-f.zip" `
            --title "${{ github.ref_name }}" `
            --draft `
            --notes "Automated release generated by GitHub Actions."
