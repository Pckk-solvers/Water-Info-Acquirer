site_name: Water-Info-Acquirer
site_description: 公開水文データから水位・流量・雨量データを取得・整理するツール
site_url: https://pckk-solvers.github.io/Water-Info-Acquirer/
repo_name: Pckk-solvers/Water-Info-Acquirer
repo_url: https://github.com/Pckk-solvers/Water-Info-Acquirer
edit_uri: edit/main/docs/

theme:
  name: readthedocs

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

nav:
  - はじめに: index.md
  - ユーザガイド:
      - 概要: user/index.md
      - クイックスタート（exe）: user/quickstart.md
      - ランチャー: user/launcher.md
      - 国土交通省 水文データ取得: user/water-info.md
      - 気象庁 雨量データ取得: user/jma-rainfall.md
      - 雨量整理・抽出: user/rainfall.md
      - 出力先とログ: user/outputs-and-logs.md
      - トラブルシューティング: user/troubleshooting.md
  - 上級者向け:
      - 概要: advanced/index.md
      - Python/uvで実行: advanced/run-with-uv.md
      - Water Info 後処理（CLI）: advanced/postprocess.md
      - 気象庁側の設定（config.yml）: advanced/jma-config.md
  - 開発者向け:
      - 概要: dev/index.md
      - Domain:
          - 概要: dev/domain/README.md
          - 時間意味と境界ルール: dev/domain/time-semantics.md
      - Requirements:
          - 概要: dev/requirements/README.md
          - Hydrology Graphs Platform: dev/requirements/hydrology-graphs-platform.md
          - Water Info 後処理: dev/requirements/postprocess.md
      - Architecture:
          - 概要: dev/architecture/README.md
          - アーキテクチャ概要: dev/architecture/overview.md
          - 起動経路: dev/architecture/entrypoints.md
          - water_info: dev/architecture/water_info.md
          - jma_rainfall_pipeline: dev/architecture/jma_rainfall_pipeline.md
          - river_meta/rainfall: dev/architecture/river_meta_rainfall.md
          - hydrology_graphs: dev/architecture/hydrology_graphs.md
          - water_info_acquirer: dev/architecture/water_info_acquirer.md
      - ADR:
          - 概要: dev/adr/README.md
      - Tasks:
          - 概要: dev/tasks/README.md
          - Active: dev/tasks/active/README.md
          - Done: dev/tasks/done/README.md
          - Cancelled: dev/tasks/cancelled/README.md
      - Reference:
          - 概要: dev/reference/README.md
          - PyInstallerビルド: dev/reference/build-pyinstaller.md
          - GitHub Pages公開: dev/reference/github-pages.md
          - リリース手順: dev/reference/release-process.md
          - Hydrology Graphs Platform:
              - 概要: dev/reference/hydrology-graphs-platform/README.md
              - Parquet契約: dev/reference/hydrology-graphs-platform/parquet-contract.md
              - Style契約: dev/reference/hydrology-graphs-platform/style-contract.md
              - Threshold契約: dev/reference/hydrology-graphs-platform/threshold-contract.md
          - Water Info 後処理:
              - 概要: dev/reference/postprocess/README.md
              - サンプル設定: dev/reference/postprocess/config.sample.json
  - リリースノート:
      - releases/index.md
      - v1.3.0: releases/v1.3.0.md
      - v1.2.0: releases/v1.2.0.md
      - v1.11: releases/v1.11.md
